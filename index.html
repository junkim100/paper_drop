<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Drop — Daily AI Paper Digest</title>
  <meta name="description" content="Daily AI research paper digest with podcast audio. Stay current with the latest in AI research and evaluation benchmarks.">
  <link rel="stylesheet" href="css/style.css?v=8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-group">
        <h1 class="site-title">
          <span class="logo-icon">📄</span>
          Paper Drop
        </h1>
        <p class="site-tagline">AI Research & Eval Podcasts</p>
      </div>
      <div class="header-controls">
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle light/dark mode">
          <span class="theme-icon-dark">☀️</span>
          <span class="theme-icon-light">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <div class="tab-nav" role="tablist" aria-label="Content sections">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-tab="paper-drop" role="tab" aria-selected="true" aria-controls="paper-drop" id="tab-paper-drop">
        <span class="tab-icon">📑</span>
        Paper Drop
      </button>
      <button class="tab-btn" data-tab="eval-drop" role="tab" aria-selected="false" aria-controls="eval-drop" id="tab-eval-drop">
        <span class="tab-icon">📊</span>
        Eval Drop
      </button>
    </div>
  </div>

  <nav class="timeline-bar" id="timeline-bar" aria-label="Date navigation">
    <div class="timeline-line"></div>
  </nav>
  <main class="content">
    <section id="paper-drop" class="tab-panel active" role="tabpanel" aria-labelledby="tab-paper-drop">
      <div class="panel-header">
        <h2>Paper Drop</h2>
        <p class="panel-desc">General AI research — curated daily</p>
      </div>
      <div id="paper-drop-list" class="drop-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading papers...</p>
        </div>
      </div>
    </section>

    <section id="eval-drop" class="tab-panel" role="tabpanel" aria-labelledby="tab-eval-drop">
      <div class="panel-header">
        <h2>Eval Drop</h2>
        <p class="panel-desc">Evaluation & benchmark research — curated daily</p>
      </div>
      <div id="eval-drop-list" class="drop-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading papers...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; 2026 Paper Drop. Built with vanilla HTML/CSS/JS.</p>
      <p class="footer-links">
        <a href="https://github.com/junkim100/paper_drop" target="_blank" rel="noopener">GitHub</a>
      </p>
    </div>
  </footer>

  <script src="js/app.js?v=7"></script>
</body>
</html>
